<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Special Days!</title>
</head>

<body>
    <div class="container">
        <div class="phone-screen">
            <div class="scene-1">
                <div class="envelope">
                    <div class="frame">
                        <div class="pic-placement">
                            <video class="birthday-video" controls>
                            </video>
                        </div>
                    </div>
                    <div class="back">
                        <div class="outline">
                            <div class="left"></div>
                        </div>
                        <div class="blank"></div>
                        <div class="outline">
                            <div class="right"></div>
                        </div>
                    </div>
                    <div class="front">
                        <div class="outline">
                            <div class="bottom"></div>
                        </div>
                    </div>
                    <div class="outline">
                        <div class="top"></div>
                    </div>
                    <div class="cover">
                        <div class="stardust">open</div>
                    </div>
                </div>
                <div class="bg"></div>
                <div class="hbd-text">Happy Birthday Mailobe</div>
                <div class="date-text">21 April 2026</div>
            </div>
        </div>
        <div class="continue">continue</div>
        <div class="subtitle-music"></div>
    </div>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.3.2/tsparticles.confetti.bundle.min.js"></script>
</body>

</html>
